<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turbn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font for a more elegant feel */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* A fallback color */
            /* A soft, ambient gradient that makes the glass effect pop */
            background-image: radial-gradient(circle at 1% 1%, rgba(224, 239, 255, 0.8), transparent 50%),
                              radial-gradient(circle at 99% 99%, rgba(255, 224, 239, 0.8), transparent 50%);
            min-height: 100vh;
        }
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }
        
        /* Global Animations */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }

        /* Renamed and updated for a seamless, continuous scroll from the start */
        @keyframes endless-scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); } /* Loops perfectly because the content is duplicated */
        }
    </style>
